version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cms-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-cms}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8082:8080"

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: cms-frontend
    restart: always
    ports:
      - "8083:80"
    depends_on:
      - backend

volumes:
  postgres_data:
